name: Docker

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
    # Publish vX.X.X tags as releases.
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

# ─── Архитектуры ──────────────────────────────────────────────────────────────
env:
  PLATFORMS: linux/amd64,linux/arm64,linux/arm/v7

jobs:
  test:
    name: Go Tests
    runs-on: ubuntu-24.04
    steps:
      - name: Check out the repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend assets
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Run tests
        run: go test -race -short ./...

  build-n-push:
    name: Build and Push
    runs-on: ubuntu-24.04
    needs: test
    steps:
      - name: Check out the repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3.6.0
        with:
          platforms: arm64,arm

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Get Version
        shell: bash
        run: echo "BUILD_VERSION=${GITHUB_REF_NAME}-${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: |
            ghcr.io/${{ github.repository }}
          flavor: |
            latest=auto
            prefix=
            suffix=
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      # ─── Шаг 1: Multi-arch Docker образ ──────────────────────────────────
      - name: Build and push multi-arch Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          platforms: ${{ env.PLATFORMS }}
          build-args: |
            BUILD_VERSION=${{ env.BUILD_VERSION }}

      # ─── Шаг 2: Экспорт wg-portal для всех архитектур ───────────────────
      - name: Export wg-portal binaries (multi-arch)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: ${{ env.PLATFORMS }}
          target: binaries
          outputs: type=local,dest=./binaries/wg-portal
          build-args: |
            BUILD_VERSION=${{ env.BUILD_VERSION }}

      # ─── Шаг 3: Экспорт amneziawg-go для всех архитектур ─────────────────
      - name: Export amneziawg-go binaries (multi-arch)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: ${{ env.PLATFORMS }}
          target: amneziawg
          outputs: type=local,dest=./binaries/amneziawg-go

      # ─── Шаг 4: Нормализация путей ──────────────────────────────────────
      - name: Normalize binary paths
        run: |
          # buildx v7 кладёт файлы в platform-underscored поддиректории
          # для multi-arch: linux_amd64/, linux_arm64/, linux_arm_v7/
          #
          # Приводим к единой структуре:
          #   binaries/
          #     amd64/wg-portal
          #     amd64/amneziawg-go
          #     arm64/wg-portal
          #     arm64/amneziawg-go
          #     arm/wg-portal
          #     arm/amneziawg-go
          
          BINROOT="./binaries"
          mkdir -p "${BINROOT}/final"
          
          # Маппинг: buildx subdir → arch name в бандле
          for src_dir in linux_amd64 linux_arm64 linux_arm_v7; do
            case "$src_dir" in
              linux_amd64)   arch="amd64" ;;
              linux_arm64)   arch="arm64" ;;
              linux_arm_v7)  arch="arm" ;;
              *)             arch="$src_dir" ;;
            esac
            
            mkdir -p "${BINROOT}/final/${arch}"
            
            # wg-portal
            if [ -f "${BINROOT}/wg-portal/${src_dir}/wg-portal" ]; then
              cp "${BINROOT}/wg-portal/${src_dir}/wg-portal" "${BINROOT}/final/${arch}/wg-portal"
            elif [ -f "${BINROOT}/wg-portal/wg-portal" ]; then
              # fallback: flat structure (buildx v7 single arch)
              cp "${BINROOT}/wg-portal/wg-portal" "${BINROOT}/final/${arch}/wg-portal"
            fi
            
            # amneziawg-go
            if [ -f "${BINROOT}/amneziawg-go/${src_dir}/amneziawg-go" ]; then
              cp "${BINROOT}/amneziawg-go/${src_dir}/amneziawg-go" "${BINROOT}/final/${arch}/amneziawg-go"
            fi
          done
          
          # fallback: если buildx положил файлы без поддиректорий (single-arch)
          if [ -f "${BINROOT}/wg-portal/wg-portal" ] && [ ! -f "${BINROOT}/final/amd64/wg-portal" ]; then
            mkdir -p "${BINROOT}/final/amd64"
            cp "${BINROOT}/wg-portal/wg-portal" "${BINROOT}/final/amd64/wg-portal"
          fi
          
          echo "=== Normalized binaries ==="
          find "${BINROOT}/final" -type f -ls

      - name: Compute build tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "BUILD_TAG=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      # ─── Шаг 5: Генерация русских release notes ──────────────────────────
      - name: Generate Russian release notes
        if: startsWith(github.ref, 'refs/tags/v')
        id: release_notes
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          # Собираем коммиты с предыдущего тега
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --oneline --no-merges)
          else
            CHANGELOG=$(git log --oneline --no-merges "${PREV_TAG}..HEAD")
          fi
          
          # Формируем описание релиза на русском
          NOTES_FILE="/tmp/release-notes-${VERSION}.md"
          {
            echo "# awg-portal ${VERSION}"
            echo ""
            # Если есть файл RELEASE_NOTES.md — используем его
            if [ -f RELEASE_NOTES.md ]; then
              cat RELEASE_NOTES.md
            else
              echo "## Что нового"
              echo ""
              # Группируем коммиты по типам
              echo "$CHANGELOG" | grep -i "feat\|add\|new\|feature" | sed 's/^/- /' || echo "- (нет)"
              echo ""
              echo "## Исправлено"
              echo ""
              echo "$CHANGELOG" | grep -i "fix\|bug\|correct\|repair\|resolve" | sed 's/^/- /' || echo "- (нет)"
              echo ""
              echo "## Прочее"
              echo ""
              echo "$CHANGELOG" | grep -v -i "feat\|add\|new\|feature\|fix\|bug\|correct\|repair\|resolve\|deps" | sed 's/^/- /' || echo "- (нет)"
            fi
            echo ""
            echo "## Установка"
            echo ""
            echo 'curl -LO https://github.com/DanilenkA/awg-portal/releases/latest/download/'"awg-portal-${VERSION}-bundle.tar.gz"
            echo 'mkdir awg-portal && cd awg-portal'
            echo 'tar xzf ../'"awg-portal-${VERSION}-bundle.tar.gz"' --strip-components=1'
            echo 'sudo bash install.sh --auto-install-deps'
            echo 'sudo nano /opt/awg-portal/config.yml'
            echo 'sudo systemctl enable --now awg-portal'
            echo ""
            echo "SHA256: \`$(sha256sum awg-portal-*-bundle.tar.gz | cut -d' ' -f1)\`"
          } > "$NOTES_FILE"
          
          echo "notes_file=${NOTES_FILE}" >> $GITHUB_OUTPUT
          echo "=== Release notes ==="
          cat "$NOTES_FILE"

      # ─── Шаг 6: Пакет бандла ─────────────────────────────────────────────
      - name: Package bundle
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${{ github.ref_name }}"
          BUNDLE_ROOT="artifacts/awg-portal-${VERSION}"
          mkdir -p "${BUNDLE_ROOT}/bin"
          
          # install.sh
          cp deploy/install.sh "${BUNDLE_ROOT}/install.sh"
          sed -i "s/VERSION=.*/VERSION=\"$VERSION\"/" "${BUNDLE_ROOT}/install.sh"
          
          # config.yml.sample
          cp config.yml.sample "${BUNDLE_ROOT}/"
          
          # Бинарники для всех архитектур
          for arch_dir in amd64 arm64 arm; do
            src="${BINROOT}/final/${arch_dir}"
            if [ -f "${src}/wg-portal" ]; then
              cp "${src}/wg-portal" "${BUNDLE_ROOT}/bin/wg-portal-${arch_dir}"
              echo "Added: wg-portal-${arch_dir}"
            fi
            if [ -f "${src}/amneziawg-go" ]; then
              cp "${src}/amneziawg-go" "${BUNDLE_ROOT}/bin/amneziawg-go-${arch_dir}"
              echo "Added: amneziawg-go-${arch_dir}"
            fi
          done
          
          # SHA256SUMS для бандла
          cd "${BUNDLE_ROOT}"
          find . -type f | sort | xargs sha256sum > ../SHA256SUMS
          cd ..
          
          # Архив
          tar czf "awg-portal-${VERSION}-bundle.tar.gz" "awg-portal-${VERSION}"
          
          echo "=== Bundle contents ==="
          tar tzf "awg-portal-${VERSION}-bundle.tar.gz"
          echo "=== SHA256SUMS ==="
          cat SHA256SUMS

      - name: Upload artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-assets
          path: |
            awg-portal-*-bundle.tar.gz
            SHA256SUMS
          retention-days: 10

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    needs: build-n-push
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-assets

      - name: Generate Russian release notes
        id: rn
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --oneline --no-merges)
          else
            LOG=$(git log --oneline --no-merges "${PREV_TAG}..HEAD")
          fi
          
          NOTES_FILE="/tmp/rn-${VERSION}.md"
          {
            echo "# awg-portal ${VERSION}"
            echo ""
            echo "## 🚀 Новое"
            echo "$LOG" | grep -iE "feat|add|new|feature" | sed 's/^/- /' || echo "- (нет)"
            echo ""
            echo "## 🐛 Исправлено"
            echo "$LOG" | grep -iE "fix|bug|correct|repair|resolve" | sed 's/^/- /' || echo "- (нет)"
            echo ""
            echo "## 🔧 Прочее"
            echo "$LOG" | grep -viE "feat|add|new|feature|fix|bug|correct|repair|resolve" | grep -v "^$" | sed 's/^/- /' || echo "- (нет)"
            echo ""
            echo "## 📦 Установка"
            echo ""
            echo '```bash'
            echo "curl -LO https://github.com/${{ github.repository }}/releases/latest/download/awg-portal-${VERSION}-bundle.tar.gz"
            echo "mkdir awg-portal && cd awg-portal"
            echo "tar xzf ../awg-portal-${VERSION}-bundle.tar.gz --strip-components=1"
            echo "sudo bash install.sh --auto-install-deps"
            echo "sudo nano /opt/awg-portal/config.yml"
            echo "sudo systemctl enable --now awg-portal"
            echo '```'
          } > "$NOTES_FILE"
          
          echo "path=${NOTES_FILE}" >> $GITHUB_OUTPUT
          cat "$NOTES_FILE"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            awg-portal-*-bundle.tar.gz
            SHA256SUMS
          body_path: ${{ steps.rn.outputs.path }}
          fail_on_unmatched_globs: true
