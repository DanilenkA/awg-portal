name: Docker

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
    # Publish vX.X.X tags as releases.
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Go Tests
    runs-on: ubuntu-24.04
    steps:
      - name: Check out the repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend assets
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Run tests
        run: go test -race -short ./...

  build-n-push:
    name: Build and Push
    runs-on: ubuntu-24.04
    needs: test
    steps:
      - name: Check out the repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Get Version
        shell: bash
        run: echo "BUILD_VERSION=${GITHUB_REF_NAME}-${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: |
            ghcr.io/${{ github.repository }}
          flavor: |
            latest=auto
            prefix=
            suffix=
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          platforms: linux/amd64
          build-args: |
            BUILD_VERSION=${{ env.BUILD_VERSION }}

      - name: Export binary from image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/amd64
          target: binaries
          outputs: type=local,dest=./binaries
          build-args: |
            BUILD_VERSION=${{ env.BUILD_VERSION }}

      - name: Compute build tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "BUILD_TAG=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Export amneziawg-go binary
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          docker create --name awg-extract ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          docker cp awg-extract:/usr/local/bin/amneziawg-go ./binaries/linux/amd64/amneziawg-go
          docker rm awg-extract

      - name: Package bundle
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${{ github.ref_name }}"
          mkdir -p artifacts/deploy
          cp binaries/linux/amd64/wg-portal artifacts/awg-portal_x86-64
          cp binaries/linux/amd64/amneziawg-go artifacts/amneziawg-go
          cp config.yml.sample artifacts/
          cp deploy/install.sh artifacts/deploy/
          # Подставляем версию в install.sh
          sed -i "s/VERSION=.*/VERSION=\"$VERSION\"/" artifacts/deploy/install.sh
          cd artifacts
          tar czf ../awg-portal-${VERSION}-bundle.tar.gz ./*
          cd ..
          echo "Bundle: awg-portal-${VERSION}-bundle.tar.gz"

      - name: Upload artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bundles
          path: awg-portal-*-bundle.tar.gz
          retention-days: 10

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    needs: build-n-push
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bundles

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: 'awg-portal-*-bundle.tar.gz'
          generate_release_notes: true
