name: Docker

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
    # Publish vX.X.X tags as releases.
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-n-push:
    name: Build and Push
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Get Version
        shell: bash
        run: echo "BUILD_VERSION=${GITHUB_REF_NAME}-${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: |
            ghcr.io/${{ github.repository }}
          flavor: |
            latest=auto
            prefix=
            suffix=
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          platforms: linux/amd64
          build-args: |
            BUILD_VERSION=${{ env.BUILD_VERSION }}

      - name: Export binary from image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          platforms: linux/amd64
          target: binaries
          outputs: type=local,dest=./binaries
          build-args: |
            BUILD_VERSION=${{ env.BUILD_VERSION }}

      - name: Compute build tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "BUILD_TAG=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Export amneziawg-go binary
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          docker create --name awg-extract ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          docker cp awg-extract:/usr/local/bin/amneziawg-go ./binaries/linux/amd64/amneziawg-go
          docker rm awg-extract

      - name: Package bundle
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${{ github.ref_name }}"
          mkdir -p artifacts/deploy
          cp binaries/linux/amd64/wg-portal artifacts/awg-portal_x86-64
          cp binaries/linux/amd64/amneziawg-go artifacts/amneziawg-go
          cp config.yml.sample artifacts/
          cp deploy/install.sh artifacts/deploy/
          # Подставляем версию в install.sh
          sed -i "s/VERSION=.*/VERSION=\"$VERSION\"/" artifacts/deploy/install.sh
          cd artifacts
          tar czf ../awg-portal-${VERSION}-bundle.tar.gz ./*
          cd ..
          echo "Bundle: awg-portal-${VERSION}-bundle.tar.gz"

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: bundles
          path: awg-portal-*-bundle.tar.gz
          retention-days: 10

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    needs: build-n-push
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bundles

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          files: 'awg-portal-*-bundle.tar.gz'
          generate_release_notes: true
